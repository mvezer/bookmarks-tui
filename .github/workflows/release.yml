name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build TUI (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-x64
            runner: macos-15-intel
          - target: darwin-arm64
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build binary
        id: build
        run: bun build:app ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookmarks-tui-${{ matrix.target }}-v${{ steps.build.outputs.version }}
          path: bookmarks-tui-${{ matrix.target }}

  build-tui-connector-chrome:
    name: Build TUI Connector Chrome
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build connector
        id: build
        run: bun run build:connector

      - name: Zip TUI Connector Chrome
        run: |
          cd tui-connector-chrome/dist
          zip -r ../tui-connector-chrome-v${{ steps.build.outputs.version }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookmarks-tui-connector-chrome-v${{ steps.version.outputs.version }}
          path: bookmarks-tui-connector-chrome-v${{ steps.version.outputs.version }}.zip

  release:
    name: Create GitHub Release
    needs: [build, build-connector-chrome]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(jq -r '.version' tui-app/package.json)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: dist/*
